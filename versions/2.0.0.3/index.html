</div>

};
var currentGuide=null;
function byId(x){return document.getElementById(x)}
function readSeen(){try{return JSON.parse(localStorage.getItem(GUIDE_KEY)||'{}')}catch(e){return{}}}
function markSeen(k){var s=readSeen();s[k]=true;localStorage.setItem(GUIDE_KEY,JSON.stringify(s))}
function appToast(t){var el=byId('toast');if(!el)return;el.textContent=t;el.classList.add('show');clearTimeout(appToast.timer);appToast.timer=setTimeout(function(){el.classList.remove('show')},1800)}
function readState(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'{}')}catch(e){return{}}}
function namesFromState(type){var s=readState();if(type==='habit')return (s.habits||[]).map(function(h){return h.name});if(type==='quote')return ((s.settings||{}).customQuotes||[]).map(function(q){return q.text});return Object.keys(s.modes||{}).map(function(k){return s.modes[k].name})}
function pick(list,n,used,key){var seen={};(used||[]).forEach(function(x){seen[x]=true});var pool=list.filter(function(x){return !seen[key?key(x):x]});var out=[];while(pool.length&&out.length<n){var i=Math.floor(Math.random()*pool.length);out.push(pool.splice(i,1)[0])}return out}
function addShellButtons(){var shell=document.querySelector('.shell');if(shell&&!byId('guideHelp')){var b=document.createElement('button');b.className='guide-help';b.id='guideHelp';b.type='button';b.title='当前区域指引';b.setAttribute('aria-label','当前区域指引');b.textContent='?';shell.insertBefore(b,shell.firstChild)}var modeActions=document.querySelector('.mode-actions');if(modeActions&&!byId('quickModeBtn')){var mb=document.createElement('button');mb.className='quick-chip';mb.id='quickModeBtn';mb.type='button';mb.textContent='✦ 灵感模式';modeActions.parentNode.insertBefore(mb,modeActions.nextSibling)}var head=document.querySelector('.card.push .section-head');if(head&&!byId('quickHabitBtn')){var skip=byId('skipHint'),tools=document.createElement('div');tools.className='head-tools';var hb=document.createElement('button');hb.className='spark-btn';hb.id='quickHabitBtn';hb.type='button';hb.title='一键添加5个灵感任务';hb.textContent='✦';if(skip){head.removeChild(skip);tools.appendChild(hb);tools.appendChild(skip);head.appendChild(tools)}else head.appendChild(hb)}var form=document.querySelector('.quote-form');if(form&&!byId('quickQuoteBtn')){var qb=document.createElement('button');qb.className='quick-chip quote-drawer-quick';qb.id='quickQuoteBtn';qb.type='button';qb.textContent='✦ 一键加三句灵感鼓励';form.parentNode.insertBefore(qb,form.nextSibling)}}
function quickAddModes(){var existing=namesFromState('mode'),chosen=[];if(existing.indexOf('成长')<0)chosen.push('成长');chosen=chosen.concat(pick(modeIdeas,2-chosen.length,existing.concat(chosen)));if(!chosen.length){appToast('灵感模式已经加得差不多啦');return}var input=byId('customModeName'),btn=byId('addCustomMode');if(!input||!btn)return;chosen.forEach(function(name,i){setTimeout(function(){input.value=name;btn.click()},i*80)});setTimeout(function(){appToast('已尝试添加 '+chosen.length+' 个灵感模式')},chosen.length*90)}
function quickAddHabits(){var input=byId('habitInput'),btn=byId('addBtn');if(!input||!btn)return;var chosen=pick(habitIdeas,5,namesFromState('habit'));if(!chosen.length){appToast('灵感任务库暂时都用过啦');return}chosen.forEach(function(name,i){setTimeout(function(){input.value=name;btn.click()},i*70)});setTimeout(function(){appToast('已加入 '+chosen.length+' 个小任务，可删除可保留')},chosen.length*80)}
function quickAddQuotes(){var text=byId('customQuoteText'),icon=byId('customQuoteIcon'),btn=byId('addQuoteBtn');if(!text||!icon||!btn)return;var chosen=pick(quoteIdeas,3,namesFromState('quote'),function(q){return q.text});if(!chosen.length){appToast('灵感句子暂时都用过啦');return}chosen.forEach(function(q,i){setTimeout(function(){text.value=q.text;icon.value=q.icon;btn.click()},i*70)});setTimeout(function(){appToast('已加入 '+chosen.length+' 句灵感鼓励')},chosen.length*90)}
function ensureLayer(){if(byId('guideLayer'))return;var layer=document.createElement('div');layer.className='guide-layer';layer.id='guideLayer';layer.hidden=true;layer.innerHTML='<div class="guide-ring" id="guideRing"></div><svg class="guide-line"><path id="guidePath"></path></svg><div class="guide-bubble" id="guideBubble"><div class="guide-count" id="guideCount"></div><p id="guideText"></p><div class="guide-actions"><button class="guide-skip" type="button" data-guide-close="1">跳过</button><button class="guide-prev" type="button" data-guide-prev="1">上一步</button><button class="guide-next" type="button" data-guide-next="1">下一步</button></div></div>';document.body.appendChild(layer)}
function visibleTarget(sel){var el=document.querySelector(sel);if(!el)return null;var r=el.getBoundingClientRect();if(r.width<2||r.height<2)return null;return el}
function currentTopic(){if(byId('quoteDrawer')&&byId('quoteDrawer').classList.contains('show'))return'quotes';if(byId('drawer')&&byId('drawer').classList.contains('show'))return'diary';if(byId('musicDock')&&byId('musicDock').classList.contains('open'))return'music';if(byId('modeSheet')&&!byId('modeSheet').hidden)return'modes';if(byId('calendar')&&byId('calendar').classList.contains('show'))return'calendar';if(document.activeElement&&document.activeElement.id==='habitInput')return'tasks';return'intro'}
function startGuide(topic,autoMark){ensureLayer();var steps=(guideSets[topic]||guideSets.intro).filter(function(s){return visibleTarget(s.sel)});if(!steps.length&&topic!=='intro')steps=guideSets.intro.filter(function(s){return visibleTarget(s.sel)});if(!steps.length)return;currentGuide={topic:topic,steps:steps,i:0};var layer=byId('guideLayer');layer.hidden=false;layer.classList.add('show');if(autoMark)markSeen(topic);showStep()}
function closeGuide(){var layer=byId('guideLayer');if(layer){layer.hidden=true;layer.classList.remove('show')}currentGuide=null}
function showStep(){if(!currentGuide)return;var st=currentGuide.steps[currentGuide.i],el=visibleTarget(st.sel);if(!el){nextStep();return}try{el.scrollIntoView({block:'center',inline:'nearest',behavior:'smooth'})}catch(e){}setTimeout(function(){positionGuide(st,el)},220)}
function positionGuide(st,el){var r=el.getBoundingClientRect(),ring=byId('guideRing'),bubble=byId('guideBubble'),path=byId('guidePath'),count=byId('guideCount'),next=document.querySelector('[data-guide-next]'),prev=document.querySelector('[data-guide-prev]');byId('guideText').textContent=st.text;count.textContent=(currentGuide.i+1)+' / '+currentGuide.steps.length;next.textContent=currentGuide.i===currentGuide.steps.length-1?'完成':'下一步';if(prev)prev.disabled=currentGuide.i===0;var gap=8;ring.style.left=Math.max(7,r.left-gap)+'px';ring.style.top=Math.max(7,r.top-gap)+'px';ring.style.width=Math.min(window.innerWidth-14,r.width+gap*2)+'px';ring.style.height=(r.height+gap*2)+'px';var bw=Math.min(286,window.innerWidth-28);bubble.style.width=bw+'px';var left=Math.min(Math.max(14,r.left+r.width/2-bw/2),window.innerWidth-bw-14);bubble.style.left=left+'px';bubble.style.top='14px';var bh=bubble.offsetHeight||128,top=r.bottom+18;if(top+bh>window.innerHeight-12)top=Math.max(14,r.top-bh-18);bubble.style.top=top+'px';var x1=Math.max(10,Math.min(window.innerWidth-10,r.left+r.width/2)),y1=Math.max(10,Math.min(window.innerHeight-10,r.top+r.height/2)),x2=left+bw/2,y2=top>r.top?top:top+bh,cy=(y1+y2)/2;path.setAttribute('d','M '+x1+' '+y1+' C '+x1+' '+cy+', '+x2+' '+cy+', '+x2+' '+y2)}
function prevStep(){if(!currentGuide||currentGuide.i<=0)return;currentGuide.i--;showStep()}function nextStep(){if(!currentGuide)return;if(currentGuide.i>=currentGuide.steps.length-1){closeGuide();return}currentGuide.i++;showStep()}
function maybeAuto(topic){var s=readSeen();if(s[topic])return;setTimeout(function(){if(topic==='modes'&&byId('modeSheet')&&byId('modeSheet').hidden)return;if(topic==='quotes'&&(!byId('quoteDrawer')||!byId('quoteDrawer').classList.contains('show')))return;if(topic==='music'&&(!byId('musicDock')||!byId('musicDock').classList.contains('open')))return;if(topic==='calendar'&&(!byId('calendar')||!byId('calendar').classList.contains('show')))return;if(topic==='diary'&&(!byId('drawer')||!byId('drawer').classList.contains('show')))return;startGuide(topic,true)},260)}
function wire(){addShellButtons();ensureLayer();document.addEventListener('click',function(e){var t=e.target;if(!t.closest)return;if(t.closest('#guideHelp')){e.preventDefault();e.stopImmediatePropagation();startGuide(currentTopic(),false)}else if(t.closest('#quickModeBtn')){e.preventDefault();e.stopImmediatePropagation();quickAddModes()}else if(t.closest('#quickHabitBtn')){e.preventDefault();e.stopImmediatePropagation();quickAddHabits();maybeAuto('tasks')}else if(t.closest('#quickQuoteBtn')){e.preventDefault();e.stopImmediatePropagation();quickAddQuotes()}else if(t.closest('[data-guide-close]')){e.preventDefault();e.stopImmediatePropagation();closeGuide()}else if(t.closest('[data-guide-prev]')){e.preventDefault();e.stopImmediatePropagation();prevStep()}else if(t.closest('[data-guide-next]')){e.preventDefault();e.stopImmediatePropagation();nextStep()}},true);var input=byId('habitInput');if(input)input.addEventListener('focus',function(){maybeAuto('tasks')});var obs=new MutationObserver(function(){addShellButtons();if(byId('modeSheet')&&!byId('modeSheet').hidden)maybeAuto('modes');if(byId('quoteDrawer')&&byId('quoteDrawer').classList.contains('show'))maybeAuto('quotes');if(byId('drawer')&&byId('drawer').classList.contains('show'))maybeAuto('diary');if(byId('calendar')&&byId('calendar').classList.contains('show'))maybeAuto('calendar');if(byId('musicDock')&&byId('musicDock').classList.contains('open'))maybeAuto('music')});obs.observe(document.body,{subtree:true,attributes:true,childList:true,attributeFilter:['class','hidden']});window.addEventListener('resize',function(){if(currentGuide)showStep()});window.addEventListener('scroll',function(){if(currentGuide)showStep()},true);if(!readSeen().intro)setTimeout(function(){startGuide('intro',true)},700)}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',wire);else wire();
})();
</script>
